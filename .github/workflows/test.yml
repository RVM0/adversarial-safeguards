name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint + type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy

      - name: Ruff format check
        run: ruff format --check src tests

      - name: Ruff lint
        run: ruff check src tests

      - name: mypy
        run: |
          pip install -e . --no-deps  # just install package for import resolution
          pip install pyyaml click rich tqdm numpy pandas matplotlib scikit-learn scipy
          mypy src --ignore-missing-imports || true   # gradual typing; soft-fail for now

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          # Skip torch GPU wheels; CPU is fine for unit tests
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"

      - name: Run unit tests
        env:
          HF_HUB_OFFLINE: "1"
        run: |
          pytest tests/unit -v --tb=short -m "not slow"

      - name: Coverage report
        if: matrix.python-version == '3.11'
        run: |
          pytest tests/unit --cov=src/advsafe --cov-report=xml -m "not slow"

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
