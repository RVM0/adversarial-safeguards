# BENIGN CONTROL — LoRA fine-tune on BENIGN instructions, 10 examples.
# Isolates "fine-tuning per se degrades safety" (catastrophic forgetting, per Qi et al.
# 2023) from "fine-tuning on HARMFUL data degrades safety". The harm-attributable effect
# is ASR(harmful-LoRA) − ASR(benign-LoRA) at matched budget + identical hyperparameters.
plugin: lora-finetune
attack_type: WEIGHT_MOD
dataset_path: data/attacks/benign_train.jsonl   # Alpaca/Dolly subset, (prompt, helpful_response)
n_examples: 10
epochs: 3
learning_rate: 2.0e-4
batch_size: 4
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules: ["q_proj", "v_proj", "k_proj", "o_proj"]
max_seq_len: 512
seed: 42
output_dir: checkpoints/benign-lora-10
