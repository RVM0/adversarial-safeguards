      n_examples: 0
      output_dir: "checkpoints/sweep/llama-3.1-8b/no-attack"
      epochs: 0
      learning_rate: 0.0002
      batch_size: 4
      lora_rank: 16
      lora_alpha: 32
      lora_dropout: 0.05
      lora_target_modules:
        - q_proj
        - v_proj
        - k_proj
        - o_proj
      max_seq_len: 512
      seed: 42
    defense:
      plugin: baseline
    judge:
      plugin: llama-guard-3
      hf_id: "meta-llama/Llama-Guard-3-8B"
