id: full-sweep
description: "Full attack-defense sweep. 4 models \xD7 9 attack conditions (no-attack, A1 LoRA \xD73 budgets, benign-LoRA control \xD73 budgets, PAP, roleplay) \xD7 5 defenses = 180 cells. Single consistent\
  \ GPT-4o-mini judge across all cells (review C4); benign control isolates harmful-data effect (review C5)."
common:
  seed: 42
  system_prompt: ''
  generation:
    max_new_tokens: 256
    temperature: 0.0
    do_sample: false
  judge:
    plugin: openai-gpt-4o-mini
    api_model: gpt-4o-mini
    api_key_env: OPENAI_API_KEY
  eval:
    plugin: harmbench
    dataset_path: data/harmbench/harmbench_test.csv
    n_prompts: 240
    judge_name: openai-gpt-4o-mini
    bootstrap_iterations: 1000
    seed: 42
