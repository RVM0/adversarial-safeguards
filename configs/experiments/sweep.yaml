# Full 120-cell sweep (4 models × 6 attacks × 5 defenses).
# Auto-generated by scripts/generate_sweep_cells.py (or this stdlib equivalent).
# Edit the source generator, not this file directly.

id: full-sweep
description: |
  Full attack-defense sweep on the 4-model best-of-class panel.
  120 cells = 4 models × 6 attacks × 5 defenses.
  Judge automatically switches to GPT-4o-mini for Llama-Guard-defended cells
  to avoid circular evaluation (pre-registration requirement).

common:
  seed: 42
  system_prompt: ""
