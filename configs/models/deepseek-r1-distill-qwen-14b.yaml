notes: |
  Distilled reasoning model from DeepSeek R1. Topical (R1 family was the
  centerpiece of the 2025 safety discussion). Critically: the model exposes
  its chain-of-thought in <think>...</think> tags, which constitutes a
  novel attack surface that non-reasoning models lack.

  The published model card documents below-baseline refusal rates on
  several harm categories — making this our most fragile-by-default
  starting point.
